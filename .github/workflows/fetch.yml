- name: Login and fetch sentiment data
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
        run: |
          set +e
          LOGIN_RESPONSE=$(curl -s "https://www.myfxbook.com/api/login.json?email=${MYFXBOOK_EMAIL}&password=${MYFXBOOK_PASSWORD}")
          echo "Login response length: ${#LOGIN_RESPONSE}"
          echo "Login response (masked check): $LOGIN_RESPONSE" | sed 's/session":"[^"]*"/session":"HIDDEN"/'

          SESSION=$(echo "$LOGIN_RESPONSE" | grep -oP '"session":"\K[^"]+')
          echo "Session extracted length: ${#SESSION}"

          sleep 5

          curl -s "https://www.myfxbook.com/api/get-community-outlook.json?session=${SESSION}" -o sentiment.json
          echo "Outlook fetch exit code: $?"
          echo "sentiment.json size:"
          wc -c sentiment.json
          echo "First 200 chars of sentiment.json:"
          head -c 200 sentiment.json
          echo ""
